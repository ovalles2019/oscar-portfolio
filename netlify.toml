# Deploy the Next.js portfolio from /motion-site.
# Use when Netlify’s linked repo directory is the repo root (leave “Base directory” empty).
# If your site still uses Base directory = oscar_portfolio, that folder has its own netlify.toml.
[build]
  base = "motion-site"
  command = "npm run build"

[build.environment]
  NODE_VERSION = "20"

[[plugins]]
  package = "@netlify/plugin-nextjs"
