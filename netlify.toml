# Deploy the Next.js portfolio from /motion-site.
#
# Netlify UI (repo root as linked site):
#   • Base directory: leave EMPTY (this file sets [build.base] below).
#   • Publish directory: leave EMPTY — required. If Publish equals Base, the Next plugin errors:
#     "publish directory cannot be the same as the base directory".
#   • Build command: leave EMPTY (uses command below) or "npm run build".
#
# If your site uses Base directory = oscar_portfolio, see oscar_portfolio/netlify.toml instead.
[build]
  base = "motion-site"
  command = "npm run build"

[build.environment]
  NODE_VERSION = "20"

[[plugins]]
  package = "@netlify/plugin-nextjs"
