# Deploy the Next.js portfolio from /motion-site.
# Use the repository root as the linked site directory in Netlify (leave “Base directory” empty).
# This file sets [build.base] so you do not need to enter motion-site in the UI.
[build]
  base = "motion-site"
  command = "npm run build"

[build.environment]
  NODE_VERSION = "20"

[[plugins]]
  package = "@netlify/plugin-nextjs"
