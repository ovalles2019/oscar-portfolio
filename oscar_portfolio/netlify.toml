[build]
  command = "npm install && curl -L -o flutter.tar.xz https://storage.googleapis.com/flutter_infra_release/releases/stable/linux/flutter_linux_${FLUTTER_VERSION}-stable.tar.xz && tar xf flutter.tar.xz && export PATH=$PATH:$PWD/flutter/bin && flutter --version && flutter doctor && flutter build web --release"
  publish = "build/web"
  functions = "netlify/functions"

[build.environment]
  FLUTTER_VERSION = "3.41.6"

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
